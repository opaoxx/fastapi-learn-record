<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First API Workbench</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f4ee;
      --ink: #1f2933;
      --muted: #617080;
      --line: #d7d0c4;
      --panel: #ffffff;
      --accent: #256f6c;
      --accent-dark: #154f4c;
      --warn: #9a5b00;
      --soft: #eef4f3;
      --danger: #8a1f11;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    header {
      border-bottom: 1px solid var(--line);
      margin-bottom: 24px;
      padding-bottom: 20px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.15;
      margin: 0 0 10px;
    }

    h2 {
      font-size: 1.15rem;
      margin: 0 0 12px;
    }

    p {
      margin: 0 0 14px;
    }

    label {
      color: var(--muted);
      display: block;
      font-size: 0.92rem;
      font-weight: 700;
      margin: 14px 0 6px;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input[type="text"],
    input[type="file"],
    select {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      padding: 10px;
      width: 100%;
    }

    button {
      align-items: center;
      background: var(--accent);
      border: 0;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      font-weight: 700;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
      min-height: 42px;
      padding: 10px 14px;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      background: #98aaa8;
      cursor: not-allowed;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .secondary-button {
      background: #315f72;
    }

    .secondary-button:hover {
      background: #234858;
    }

    .layout {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .status {
      border-left: 5px solid var(--warn);
    }

    .history {
      margin-top: 16px;
    }

    .history-head {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .history-meta {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.92rem;
      padding: 8px 10px;
    }

    .history-controls {
      border-top: 1px solid var(--line);
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr auto;
      margin: 12px 0 16px;
      padding-top: 14px;
    }

    .status-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .status-filter,
    .page-button {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink);
      margin-top: 0;
    }

    .status-filter:hover,
    .page-button:hover {
      background: var(--soft);
    }

    .status-filter[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .page-size-control {
      min-width: 140px;
    }

    .pager {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      margin: 12px 0 0;
    }

    .pager-buttons {
      display: flex;
      gap: 8px;
    }

    .page-button:disabled {
      background: #eef0ef;
      color: #8a9499;
    }

    .task-list {
      display: grid;
      gap: 10px;
    }

    .task-row {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
    }

    .task-row header {
      align-items: center;
      border: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      justify-content: space-between;
      margin: 0 0 8px;
      padding: 0;
    }

    .task-id {
      font-weight: 800;
    }

    .task-status {
      background: var(--soft);
      border-radius: 999px;
      color: var(--accent-dark);
      font-size: 0.82rem;
      font-weight: 800;
      padding: 3px 9px;
      text-transform: uppercase;
    }

    .task-error {
      color: var(--danger);
      font-weight: 700;
    }

    pre {
      background: #111827;
      border-radius: 8px;
      color: #f8fafc;
      min-height: 220px;
      overflow-x: auto;
      padding: 16px;
      white-space: pre-wrap;
    }

    .muted {
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 640px) {
      .history-controls {
        grid-template-columns: 1fr;
      }

      .page-size-control {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="muted">First FastAPI API</p>
      <h1>文件摘要工作台</h1>
      <p>上传 UTF-8 文本文件，创建摘要任务，再读取任务结果。这个页面是给第 18 课使用的最小前端。</p>
    </header>

    <div class="layout">
      <section class="panel">
        <h2>输入</h2>
        <label for="api-key">X-API-Key</label>
        <input id="api-key" type="text" value="dev-secret-key" autocomplete="off">

        <label for="text-file">选择 .txt 文件</label>
        <input id="text-file" type="file" accept=".txt,text/plain">

        <div class="button-row">
          <button id="run-button" type="button">上传并生成摘要</button>
          <button id="refresh-history" class="secondary-button" type="button">刷新任务历史</button>
        </div>
        <p class="muted">运行服务后访问 <code>/app/</code>，这个页面会用浏览器的 <code>fetch</code> 调用后端。</p>
      </section>

      <section class="panel status">
        <h2>响应</h2>
        <pre id="output">等待操作...</pre>
      </section>
    </div>

    <section class="panel history" aria-labelledby="task-history-title">
      <div class="history-head">
        <div>
          <h2 id="task-history-title">任务历史</h2>
          <p class="muted">用状态筛选和分页控件构造 <code>GET /tasks</code> 查询。</p>
        </div>
        <div id="history-meta" class="history-meta">尚未加载</div>
      </div>

      <div class="history-controls">
        <div>
          <label>状态筛选</label>
          <div class="status-filters" role="group" aria-label="任务状态筛选">
            <button class="status-filter" type="button" data-status="" aria-pressed="true">全部</button>
            <button class="status-filter" type="button" data-status="queued" aria-pressed="false">Queued</button>
            <button class="status-filter" type="button" data-status="running" aria-pressed="false">Running</button>
            <button class="status-filter" type="button" data-status="completed" aria-pressed="false">Completed</button>
            <button class="status-filter" type="button" data-status="failed" aria-pressed="false">Failed</button>
          </div>
        </div>

        <div class="page-size-control">
          <label for="history-limit">每页数量</label>
          <select id="history-limit">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>

      <div id="task-list" class="task-list" aria-live="polite"></div>
      <div class="pager" aria-label="任务历史分页">
        <span id="pager-info" class="muted">等待加载</span>
        <div class="pager-buttons">
          <button id="history-previous" class="page-button" type="button">上一页</button>
          <button id="history-next" class="page-button" type="button">下一页</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const runButton = document.querySelector("#run-button");
    const refreshHistoryButton = document.querySelector("#refresh-history");
    const output = document.querySelector("#output");
    const taskList = document.querySelector("#task-list");
    const historyMeta = document.querySelector("#history-meta");
    const pagerInfo = document.querySelector("#pager-info");
    const previousPageButton = document.querySelector("#history-previous");
    const nextPageButton = document.querySelector("#history-next");
    const historyLimit = document.querySelector("#history-limit");
    const statusFilterButtons = document.querySelectorAll(".status-filter");

    const historyState = {
      status: "",
      limit: Number(historyLimit.value),
      offset: 0,
      count: 0,
      itemsLength: 0,
    };

    function show(value) {
      output.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    function getApiKey() {
      return document.querySelector("#api-key").value.trim();
    }

    async function parseJsonResponse(response) {
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(`${response.status} ${response.statusText}: ${JSON.stringify(body)}`);
      }
      return body;
    }

    function buildTaskHistoryUrl() {
      const params = new URLSearchParams({
        limit: String(historyState.limit),
        offset: String(historyState.offset),
      });

      if (historyState.status) {
        params.set("status", historyState.status);
      }

      return `/tasks?${params.toString()}`;
    }

    function renderStatusFilters() {
      for (const button of statusFilterButtons) {
        button.setAttribute("aria-pressed", String(button.dataset.status === historyState.status));
      }
    }

    function renderPager() {
      const start = historyState.count === 0 ? 0 : historyState.offset + 1;
      const end = historyState.offset + historyState.itemsLength;
      pagerInfo.textContent = `第 ${start}-${end} 条 / 共 ${historyState.count} 条`;
      previousPageButton.disabled = historyState.offset === 0;
      nextPageButton.disabled = historyState.offset + historyState.itemsLength >= historyState.count;
    }

    function renderTaskHistory(page) {
      taskList.replaceChildren();
      historyState.count = page.count;
      historyState.limit = page.limit;
      historyState.offset = page.offset;
      historyState.itemsLength = page.items.length;

      const statusText = historyState.status || "全部";
      historyMeta.textContent = `状态=${statusText}；limit=${page.limit}；offset=${page.offset}；本页 ${page.items.length} 条`;
      renderStatusFilters();
      renderPager();

      if (page.items.length === 0) {
        const empty = document.createElement("p");
        empty.className = "muted";
        empty.textContent = "当前条件下没有任务。可以换一个状态筛选，或上传一个 .txt 文件。";
        taskList.append(empty);
        return;
      }

      for (const task of page.items) {
        const row = document.createElement("article");
        row.className = "task-row";

        const rowHead = document.createElement("header");
        const taskId = document.createElement("span");
        taskId.className = "task-id";
        taskId.textContent = `任务 #${task.id}`;

        const status = document.createElement("span");
        status.className = "task-status";
        status.textContent = task.status;

        rowHead.append(taskId, status);

        const textInfo = document.createElement("p");
        textInfo.className = "muted";
        textInfo.textContent = `文本长度：${task.text_length}；来源文件：${task.source_file_id ?? "手动输入"}`;

        const result = document.createElement("p");
        if (task.error) {
          result.className = "task-error";
          result.textContent = task.error;
        } else {
          result.textContent = task.result || "任务还在等待处理。";
        }

        row.append(rowHead, textInfo, result);
        taskList.append(row);
      }
    }

    async function loadTaskHistory() {
      const apiKey = getApiKey();
      if (!apiKey) {
        historyMeta.textContent = "缺少 X-API-Key";
        taskList.replaceChildren();
        return;
      }

      refreshHistoryButton.disabled = true;
      historyMeta.textContent = "加载中...";

      try {
        const response = await fetch(buildTaskHistoryUrl(), {
          headers: {"X-API-Key": apiKey},
        });
        const page = await parseJsonResponse(response);
        renderTaskHistory(page);
      } catch (error) {
        historyMeta.textContent = "加载失败";
        taskList.replaceChildren();
        const message = document.createElement("p");
        message.className = "task-error";
        message.textContent = error.message;
        taskList.append(message);
      } finally {
        refreshHistoryButton.disabled = false;
      }
    }

    refreshHistoryButton.addEventListener("click", loadTaskHistory);

    for (const button of statusFilterButtons) {
      button.addEventListener("click", async () => {
        historyState.status = button.dataset.status;
        historyState.offset = 0;
        await loadTaskHistory();
      });
    }

    historyLimit.addEventListener("change", async () => {
      historyState.limit = Number(historyLimit.value);
      historyState.offset = 0;
      await loadTaskHistory();
    });

    previousPageButton.addEventListener("click", async () => {
      historyState.offset = Math.max(historyState.offset - historyState.limit, 0);
      await loadTaskHistory();
    });

    nextPageButton.addEventListener("click", async () => {
      if (historyState.offset + historyState.itemsLength < historyState.count) {
        historyState.offset += historyState.limit;
        await loadTaskHistory();
      }
    });

    runButton.addEventListener("click", async () => {
      const apiKey = getApiKey();
      const fileInput = document.querySelector("#text-file");
      const file = fileInput.files[0];

      if (!file) {
        show("请先选择一个 .txt 文件。");
        return;
      }

      runButton.disabled = true;
      show("上传文件中...");

      try {
        const formData = new FormData();
        formData.append("file", file);

        const uploadResponse = await fetch("/files/text", {
          method: "POST",
          headers: {"X-API-Key": apiKey},
          body: formData,
        });
        const uploaded = await parseJsonResponse(uploadResponse);

        show({step: "uploaded", uploaded});

        const taskResponse = await fetch(`/tasks/files/${uploaded.id}/summary`, {
          method: "POST",
          headers: {"X-API-Key": apiKey},
        });
        const createdTask = await parseJsonResponse(taskResponse);

        const resultResponse = await fetch(`/tasks/${createdTask.id}`, {
          headers: {"X-API-Key": apiKey},
        });
        const task = await parseJsonResponse(resultResponse);

        show({uploaded, task});
        await loadTaskHistory();
      } catch (error) {
        show(error.message);
      } finally {
        runButton.disabled = false;
      }
    });

    loadTaskHistory();
  </script>
</body>
</html>
